jack.rules = [
  {
    matches = [ { application.process.binary = "scsynth" } ]
    actions = {
      update-props = {
        # Prevent scsynth from self-connecting to system:playback (first ALSA device).
        # WirePlumber will auto-route it to the default sink instead.
        jack.self-connect-mode = ignore-all
      }
    }
  }
]
