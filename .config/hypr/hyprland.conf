# ──────────────────────────────────────────
# Hyprland Configuration (organized & documented)
# ──────────────────────────────────────────

# --- Monitor Setup ----------------------------------------------------------
#monitor = HDMI-A-1,3840x2160@60.00Hz,auto,1,bitdepth,8,cm,auto
#monitor=HDMI-A-1,3840x2160@120.00Hh,0x0,1
#monitor=HDMI-A-1,3840x2160@120,0x0,1,bitdepth,10,vrr,0,cm,wide
#monitor = DP-2,3840x2160@100.00Hz,0x0,1,vrr,2,bitdepth,8
#monitor = eDP-1,disable
#monitor = HDMI-A-1,disable
#monitor = DP-1,disable

monitorv2 {
    output = HDMI-A-1
    #output = DP-2
    #mode = 3840x2160@60Hz
    mode = 3840x2160@120.00Hz
    position = 0x0
    scale = 1
    #bitdepth = 10
    bitdepth = 8
    vrr = 0
    cm = auto
    #supports_hdr = 1
    #supports_wide_color = 1
}

# Display cursor themes and sizes
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,20
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,20

# NVIDIA Configuration
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = __EGL_VENDOR_LIBRARY_FILENAMES,/usr/share/glvnd/egl_vendor.d/10_nvidia.json
env = GBM_BACKEND,nvidia-drm
env = __GL_MaxFramesAllowed,1
env = __GL_VRR_ALLOWED,0
env = VDPAU_DRIVER,nvidia
env = PROTON_ENABLE_NGX_UPDATER,1
env = MOZ_DISABLE_RDD_SANDBOX,1

env = KITTY_DISABLE_WAYLAND,1

# Wayland-specific
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct

# --- Cursor Configuration ---------------------------------------------------
cursor {
    no_hardware_cursors = true  # Required for NVIDIA
    enable_hyprcursor  = false
    #default_monitor     = 'DP-2'
    #use_cpu_buffer      = true
}

# --- Input Configuration ----------------------------------------------------
input {
    kb_layout      = pl
    follow_mouse   = 0
    force_no_accel = 1
    sensitivity    = 1
}

# --- General Window Settings ------------------------------------------------
general {
    gaps_in        = 5
    gaps_out       = 10
    border_size    = 3
    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border    = false
    allow_tearing       = false
}

# --- Xwayland ---------------------------------------------------------------
xwayland {
    enabled             = true
    force_zero_scaling  = true
}

# --- Debug ------------------------------------------------------------------
debug {
    #disable_logs = false
    #overlay      = true
    #full_cm_proto = 1
}

# --- Decoration & Visuals ----------------------------------------------------
decoration {
    rounding = 10

    blur {
        enabled           = false
        size              = 1
        passes            = 1
        new_optimizations = true
        ignore_opacity    = true
    }

    shadow {
        enabled       = false
        range         = 4
        render_power  = 3
        color_inactive = rgba(1a1a1aee)
        color          = rgba(33ccffee)
    }
}

# --- Performance & Rendering -------------------------------------------------
render {
    cm_enabled = true
    new_render_scheduling = false
    direct_scanout = 0
}

opengl {
    nvidia_anti_flicker = true
}

misc {
    vrr = 0
    vfr = false
}

# --- Animations --------------------------------------------------------------
animations {
    enabled = true
    bezier  = overshot,0.05,0.9,0.1,1.1

    animation = windows,1,2,default
    animation = border,1,10,default
    animation = fade,1,1,default
    animation = workspaces,1,2,default,slide
}

# --- Layout ------------------------------------------------------------------
dwindle {
    pseudotile      = 0
    preserve_split  = 1
}

# --- Gestures & Binds --------------------------------------------------------
binds {
    scroll_event_delay = 0
}

# Window control binds
bind = ALT,F,fullscreen,1
bind = SUPER, h, layoutmsg, togglesplit

# Workspace navigation
bind = ALT,1,workspace,1
bind = ALT,2,workspace,2
bind = ALT,3,workspace,3
bind = ALT,4,workspace,4
bind = ALT,5,workspace,5
bind = ALT,6,workspace,6
bind = ALT,7,workspace,7
bind = ALT,8,workspace,8
bind = ALT,9,workspace,9
bind = ALT,0,workspace,10

# Move window to workspace
bind = ALTSHIFT,1,movetoworkspace,1
bind = ALTSHIFT,2,movetoworkspace,2
bind = ALTSHIFT,3,movetoworkspace,3
bind = ALTSHIFT,4,movetoworkspace,4
bind = ALTSHIFT,5,movetoworkspace,5
bind = ALTSHIFT,6,movetoworkspace,6
bind = ALTSHIFT,7,movetoworkspace,7
bind = ALTSHIFT,8,movetoworkspace,8
bind = ALTSHIFT,9,movetoworkspace,9
bind = ALTSHIFT,0,movetoworkspace,10

# Floating, pin, move, resize submaps
bind = ALTSHIFT,V,togglefloating
bind = ALTSHIFT,T,pin
bindm = ALT,mouse:272,movewindow
bindm = ALT,mouse:273,resizewindow

# Move submap
bind = ALTSHIFT,K,submap,move
submap = move
binde = ,left,moveactive,-30 0
binde = ,right,moveactive,30 0
binde = ,up,moveactive,0 -30
binde = ,down,moveactive,0 30
bind = ,escape,submap,reset
submap = reset

# Resize submap
bind = ALT,R,submap,resize
submap = resize
binde = ,left,resizeactive,-20 0
binde = ,right,resizeactive,20 0
binde = ,up,resizeactive,0 -20
binde = ,down,resizeactive,0 20
bind = ,escape,submap,reset
submap = reset

# Focus movement
bind = ALT,h,movefocus,l
bind = ALT,l,movefocus,r
bind = ALT,k,movefocus,u
bind = ALT,j,movefocus,d

# Main controls
bind = ALT,D,exec,bemenu-run
bind = SUPER,V,exec,cliphist list | bemenu -l 15 -p "📋" | cliphist decode | wl-copy
bind = ALTSHIFT,Q,killactive,
bind = ALT,RETURN,exec,KITTY_DISABLE_WAYLAND=1 kitty --single-instance
bind = ALTSHIFT,E,exit

# Multimedia & volume
bind = ,XF86AudioRaiseVolume,exec,pactl set-sink-volume 0 +1%
bind = ,XF86AudioLowerVolume,exec,pactl set-sink-volume 0 -1%
bind = ,XF86AudioPlay,exec,playerctl play-pause
bind = ,XF86AudioPause,exec,playerctl play-pause
bind = ,XF86AudioNext,exec,playerctl next
bind = ,XF86AudioPrevious,exec,playerctl previous
bind = ,XF86AudioStop,exec,playerctl stop
bind = ,Print,exec,~/.local/bin/screenshot
bind = ,F6,exec,~/.local/bin/kira-next-tick
bind = ,F3,exec,notify-send -t 0 -h string:x-canonical-private-synchronous:gpt-correct "⏳ Polishing..." && wl-paste | gpt-correct --prompt prompt-eloquent.txt | wl-copy && notify-send -t 2000 -h string:x-canonical-private-synchronous:gpt-correct "✓ Text polished"
bind = ,F4,exec,notify-send -t 0 -h string:x-canonical-private-synchronous:gpt-correct "⏳ Rewriting..." && wl-paste | gpt-correct --prompt prompt-rewrite.txt | wl-copy && notify-send -t 2000 -h string:x-canonical-private-synchronous:gpt-correct "✓ Text rewritten"
bind = ,F7,exec,f=$(ls -t ~/Pictures/Screenshots/*.jpg 2>/dev/null | head -1) && [ -n "$f" ] && echo -n "$f" | wl-copy
#bind = SUPER,F2,exec,notify-send -t 0 -h string:x-canonical-private-synchronous:gpt-correct "⏳ Correcting (Gemini)..." && wl-paste | gpt-correct --model gemini | wl-copy && notify-send -t 2000 -h string:x-canonical-private-synchronous:gpt-correct "✓ Text corrected"
#bind = SUPER,F3,exec,notify-send -t 0 -h string:x-canonical-private-synchronous:gpt-correct "⏳ Polishing (Gemini)..." && wl-paste | gpt-correct --model gemini --prompt prompt-eloquent.txt | wl-copy && notify-send -t 2000 -h string:x-canonical-private-synchronous:gpt-correct "✓ Text polished"
bind = SUPER,F4,exec,notify-send -t 0 -h string:x-canonical-private-synchronous:gpt-correct "⏳ Rewriting (Gemini)..." && wl-paste | gpt-correct --model gemini --prompt prompt-rewrite.txt | wl-copy && notify-send -t 2000 -h string:x-canonical-private-synchronous:gpt-correct "✓ Text rewritten"
bind = SUPER,F5,exec,notify-send -t 0 -h string:x-canonical-private-synchronous:gpt-correct "⏳ Styling (Gemini)..." && wl-paste | gpt-correct --model gemini --prompt prompt-lust.txt | wl-copy && notify-send -t 2000 -h string:x-canonical-private-synchronous:gpt-correct "✓ Text styled"
bind = SUPER,R,exec,hyprvoice toggle
bind = SUPER SHIFT,R,exec,hyprvoice toggle --no-llm
bind = SUPER,A,exec,~/.config/hypr/./changeSoundCard.sh

# Waybar toggles
bind = SUPER,S,exec,pkill -SIGUSR1 waybar; sleep 10; pkill -SIGUSR1 waybar
bindo = ,XF86AudioPrev,exec,pkill -SIGUSR1 waybar; sleep 10; pkill -SIGUSR1 waybar

# Mouse volume controls
bind = ,mouse_left,exec,increase_volume && show_volume
bind = ,mouse_right,exec,decrease_volume && show_volume

# Window opacity (SUPER + scroll wheel)
binde = SUPER, mouse_up, exec, ~/.config/hypr/scripts/opacity.sh up
binde = SUPER, mouse_down, exec, ~/.config/hypr/scripts/opacity.sh down
binde = SUPER,up,exec,increase_volume && show_volume
binde = SUPER,down,exec,decrease_volume && show_volume

# Custom TV controls
bind = SUPER,D,exec,~/Programming/tv/venv/bin/python ~/Programming/tv/test.py --ip 10.11.12.8 --offscreen
bind = SUPER,1,exec,~/Programming/tv/venv/bin/python ~/Programming/tv/test.py --ip 10.11.12.8 --backlight 0
bind = SUPER,2,exec,~/Programming/tv/venv/bin/python ~/Programming/tv/test.py --ip 10.11.12.8 --backlight 90

# VM passthrough (mouse forward button or F1 to toggle)
bind = ,mouse:277,exec,notify-send -t 0 -h string:x-canonical-private-synchronous:passthrough "🔴 PASSTHROUGH"
bind = ,mouse:277,submap,passthrough
#bind = ,F1,exec,notify-send -t 0 -h string:x-canonical-private-synchronous:passthrough "🔴 PASSTHROUGH"
#bind = ,F1,submap,passthrough
submap = passthrough
bind = ,mouse:277,exec,makoctl dismiss
bind = ,mouse:277,submap,reset
#bind = ,F1,exec,makoctl dismiss
#bind = ,F1,submap,reset
submap = reset

# --- Autostart ---------------------------------------------------------------
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = mako
exec-once = eww daemon && eww open dashboard
exec-once = ~/.local/bin/mako-sound-notify.py &
exec-once = waybar
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE
exec = hyprshade auto
exec-once = swww-daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Ensure screen sharing vars and Mozilla hardware acceleration
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP MOZ_DISABLE_RDD_SANDBOX LIBVA_DRIVER_NAME MOZ_ENABLE_WAYLAND

# Kira's embedding model for memory system
exec-once = ~/.local/bin/lmstudio-autostart.sh

# Allow source user to access Wayland display
exec-once = xhost +SI:localuser:source && setfacl -m u:source:rx /run/user/1000

# --- Workspaces & Window Rules ----------------------------------------------
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

windowrule = match:float false, match:workspace w[tv1], border_size 0
windowrule = match:float false, match:workspace w[tv1], rounding 0
windowrule = match:float false, match:workspace f[1], border_size 0
windowrule = match:float false, match:workspace f[1], rounding 0

# Kitty XWayland fix - force tiled mode
windowrule = match:class ^(kitty)$, tile on

# Playwright Chromium - float to allow proper window sizing (accounting for 1.5x scaling)
windowrule = match:class ^(chromium-browser)$, match:title ^about:blank - Chromium$, float on
windowrule = match:class ^(chromium-browser)$, match:title ^about:blank - Chromium$, size 2880 1620
windowrule = match:class ^(chromium-browser)$, match:title ^about:blank - Chromium$, center on

# Tearing Albion
windowrule = match:class ^(Albion-Online)$, immediate on

windowrule = match:class ^(steam_app_\d+)$, tag +games
windowrule = match:tag games, fullscreen on

# Kira Visual - floating fullscreen overlay
windowrule = match:title ^Kira Visual$, float on
windowrule = match:title ^Kira Visual$, fullscreen on

# Added by ripple install script to highlight clicks
bindn = ,mouse:272,exec,ripple-trigger

# HyprEmoji config
source = ~/.config/hypremoji/hypremoji.conf
