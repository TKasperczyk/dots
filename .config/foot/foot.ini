# Mirrors luth's kitty setup (SauceCodePro NF Mono 11, nvim-as-shell).
# foot is CPU-native: kitty's GL rendering of the always-on nvim sessions was
# burning 55-68% CPU each on the GPU/llvmpipe path. Same switch as the P4 VM.
[main]
# xterm-256color so SSH to hosts without foot terminfo keeps working
term=xterm-256color
font=SauceCodePro Nerd Font Mono:size=11:weight=medium, JoyPixels:size=11
pad=10x10
shell=nvim +terminal

[scrollback]
lines=20000

[cursor]
style=beam
blink=no

[colors]
alpha=0.8

[bell]
urgent=yes
visual=no
